name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  xml:
    name: XML well-formedness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate every *.xml under templates/
        run: |
          shopt -s nullglob
          files=(templates/*.xml)
          if (( ${#files[@]} == 0 )); then
            echo "::error::No XML templates found under templates/."
            exit 1
          fi
          for f in "${files[@]}"; do
            echo "→ $f"
            xmllint --noout "$f"
          done

      # ca_profile.xml is the repository-level profile XML CA reads when
      # rendering the maintainer's profile card. It lives at the repo root,
      # not under templates/, so it falls outside the loop above.
      - name: Validate ca_profile.xml at repo root
        run: |
          if [[ -f ca_profile.xml ]]; then
            echo "→ ca_profile.xml"
            xmllint --noout ca_profile.xml
          fi

  template-url:
    name: TemplateURL self-reference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Each template's <TemplateURL> must resolve to the same file's raw URL
      # on this repo's main branch. CA's appfeed dereferences <TemplateURL> on
      # update polling; if it points at a different repo or a different
      # filename, users get the wrong updates or none at all.
      - name: Verify <TemplateURL> matches the file's raw URL
        env:
          REPO: ${{ github.repository }}
        run: |
          shopt -s nullglob
          files=(templates/*.xml)
          fail=0
          for f in "${files[@]}"; do
            expected="https://raw.githubusercontent.com/${REPO}/main/${f}"
            actual="$(grep -oE '<TemplateURL>[^<]+</TemplateURL>' "$f" | sed -E 's|<TemplateURL>(.*)</TemplateURL>|\1|')"
            if [[ "$actual" != "$expected" ]]; then
              echo "::error file=${f}::TemplateURL mismatch"
              echo "  expected: $expected"
              echo "  actual:   $actual"
              fail=1
            else
              echo "✓ $f"
            fi
          done
          exit "$fail"

  categories:
    name: Category whitelist (live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Source of truth: the canonical category list lives in CA's appfeed
      # repo at Squidly271/AppFeed/categoryList.json. Fetching it at lint time
      # eliminates drift — when CA adds a new category (recent additions
      # include AI, GameServers, Security, Network:VPN, Network:Privacy),
      # this lint job picks it up automatically.
      #
      # Format note: the JSON uses hyphens (Network-Messenger), the XML uses
      # colons (Network:Messenger). CA normalizes between them; we match by
      # converting the JSON form to the XML form.
      #
      # Status:Stable / Status:Beta are also valid in <Category> but live
      # outside the category list (they're flags, not categories), so we
      # allow that prefix explicitly.
      - name: Fetch canonical category list and verify <Category> tokens
        run: |
          shopt -s nullglob
          files=(templates/*.xml)
          curl -fsSL --retry 3 --max-time 30 \
            https://raw.githubusercontent.com/Squidly271/AppFeed/master/categoryList.json \
            -o categoryList.json
          # JSON is a flat array; strip quotes/brackets/commas to get
          # one entry per line, then convert hyphens to colons.
          allowed="$(jq -r '.[].Cat' categoryList.json | tr '-' ':')"
          fail=0
          for f in "${files[@]}"; do
            categories="$(grep -oE '<Category>[^<]+</Category>' "$f" | sed -E 's|<Category>(.*)</Category>|\1|')"
            if [[ -z "$categories" ]]; then
              echo "::error file=${f}::missing <Category>"
              fail=1
              continue
            fi
            for tok in $categories; do
              # Status:Stable / Status:Beta are flags, not categories — allow.
              if [[ "$tok" == Status:* ]]; then
                continue
              fi
              if ! grep -Fxq "$tok" <<< "$allowed"; then
                echo "::error file=${f}::unknown category token '$tok' (see https://raw.githubusercontent.com/Squidly271/AppFeed/master/categoryList.json)"
                fail=1
              fi
            done
            (( fail == 0 )) && echo "✓ $f ($categories)"
          done
          exit "$fail"

  profile:
    name: ca_profile.xml schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      # Sources:
      #   https://ca.unraid.net/submit/help/repository-info-xml
      #   https://ca.unraid.net/submit/help/xml-field-reference
      #
      # ca_profile.xml is read by CA when rendering this repo's maintainer
      # profile card. The required field is <Profile>; the rest are optional
      # but constrained to a documented set. CA's parser silently ignores
      # unknown elements, so a typo like <Webpage> would never surface as a
      # visible error. This job catches schema drift at push time.
      - name: Verify ca_profile.xml schema
        if: hashFiles('ca_profile.xml') != ''
        run: |
          f=ca_profile.xml
          fail=0

          # Root element must be <CommunityApplications>.
          root=$(xmllint --xpath 'name(/*)' "$f")
          if [[ "$root" != "CommunityApplications" ]]; then
            echo "::error file=${f}::root element must be <CommunityApplications>, got <${root}>"
            fail=1
          fi

          # <Profile> is required, must occur exactly once, and must be non-empty.
          profile_count=$(xmllint --xpath 'count(/CommunityApplications/Profile)' "$f")
          if [[ "$profile_count" != "1" ]]; then
            echo "::error file=${f}::expected exactly one <Profile> element, found ${profile_count}"
            fail=1
          else
            profile_text=$(xmllint --xpath 'normalize-space(/CommunityApplications/Profile)' "$f")
            if [[ -z "$profile_text" ]]; then
              echo "::error file=${f}::<Profile> must be non-empty"
              fail=1
            fi
          fi

          # Whitelist of accepted direct children of <CommunityApplications>.
          # Any other tag is rejected since CA silently drops unknowns.
          allowed=(Profile Forum WebPage Icon Discord Facebook Photo Reddit Twitter Video DonateLink DonateText)
          # The file is flat (no nesting beyond direct children), so a simple
          # tag-name extraction is sufficient. Skip the root element itself.
          children=$(grep -oE '<[A-Za-z][A-Za-z0-9]*' "$f" | tr -d '<' | sort -u)
          for c in $children; do
            [[ "$c" == "CommunityApplications" ]] && continue
            ok=0
            for a in "${allowed[@]}"; do
              [[ "$c" == "$a" ]] && ok=1 && break
            done
            if (( ok == 0 )); then
              echo "::error file=${f}::unknown element <${c}>; CA's parser silently ignores unknowns"
              fail=1
            fi
          done

          # URL-typed fields, when present, must look like http(s):// URLs.
          # DonateText is text, not a URL, so it's excluded.
          url_fields=(Forum WebPage Icon Discord Facebook Photo Reddit Twitter Video DonateLink)
          for tag in "${url_fields[@]}"; do
            val=$(xmllint --xpath "string(/CommunityApplications/${tag})" "$f")
            if [[ -n "$val" && ! "$val" =~ ^https?:// ]]; then
              echo "::error file=${f}::<${tag}> must be an http(s):// URL, got '${val}'"
              fail=1
            fi
          done

          (( fail == 0 )) && echo "✓ $f"
          exit "$fail"

  format:
    name: dockerMan-canonical format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Two checks the CA parser is sensitive to:
      #
      # 1. Forbidden tags. v1 schema blocks (Networking/Data/Environment/Labels)
      #    were superseded by <Config> in Unraid 6.10; dockerMan stopped
      #    emitting them on save and the source should not include them.
      #
      # 2. <Config> attribute spacing. Per Squid's parser-compatibility
      #    warning in the schema thread, extra whitespace between attributes
      #    on a <Config> element breaks the CA parser silently. dockerMan
      #    generates them single-spaced. Anything other than ' ' (one space)
      #    between attributes is rejected.
      - name: Reject forbidden tags + verify <Config> attribute spacing
        run: |
          shopt -s nullglob
          files=(templates/*.xml)
          forbidden=("Networking" "Data" "Environment" "Labels")
          fail=0
          for f in "${files[@]}"; do
            for tag in "${forbidden[@]}"; do
              if grep -qE "<${tag}[> /]" "$f"; then
                echo "::error file=${f}::forbidden tag <${tag}> found in source. v1 legacy (Networking/Data/Environment/Labels) is superseded by <Config>."
                fail=1
              fi
            done
            # Look for any <Config ... > line where attribute pairs are
            # separated by something other than a single space. dockerMan
            # never emits double spaces or tabs between attributes. PCRE
            # mode (-P) is required so \t is interpreted as a tab — in
            # POSIX ERE \t means the literal letter t.
            if grep -nP '<Config[^>]*(  |\t)' "$f"; then
              echo "::error file=${f}::extra whitespace between <Config> attributes (CA's parser is sensitive to this)."
              fail=1
            fi
            (( fail == 0 )) && echo "✓ $f"
          done
          exit "$fail"
